<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Documentações</title>

    <link
      rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
    />

    <!-- 1. Carrega primeiro as definições de cores -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/colors.css') }}"
    />

    <!-- 2. Carrega os estilos principais -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />

    <!-- 3. Carrega os estilos de modais e toasts -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/modal.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/toast.css') }}"
    />

    <!-- 4. Carrega o CSS do Quill -->
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      rel="stylesheet"
    />

    <!-- 5. Carrega as sobrescrições para o Quill por último -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/quill-overrides.css') }}"
    />

    <!-- Tailwind CSS CLI -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/tailwind.css') }}"
    />

    <!-- Scripts -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/maska@2.1.10/dist/maska.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  </head>

  <body>
    <div id="app">
      <toast-notification
        :toasts="notificationService.toasts"
      ></toast-notification>
      <!-- Toggle de Tema -->
      <theme-toggle :is-dark="isDark" @toggle="toggleTheme"></theme-toggle>

      <div class="container">
        <div class="main-card">
          <page-header
            title="Gerador de Documentações Técnicas"
            icon="📝"
            tooltip-title="Este sistema gera um arquivo .zip com documentos de desenvolvimento:"
            :tooltip-items="[
                              'Estimativa de Esforço e Cronograma',
                              'Estratégia de Solução',
                              'Relatório de Acompanhamento de Projeto'
                            ]"
          ></page-header>

          <!-- Formulário de Informações básicas da SS -->
          <basic-form-section
            ref="basicFormSection"
            :form-data="formData"
            :selected-autores="selectedAutores"
            :autor-input="autorInput"
            :show-suggestions="showSuggestions"
            :filtered-autores="filteredAutores"
            :highlighted-index="highlightedIndex"
            @update:numero-ss="formData.numeroSS = $event"
            @format-ss="formatSS"
            @update:autor-input="handleAutorInputUpdate"
            @show-suggestions="toggleSuggestions"
            @navigate-list="navigateList($event)"
            @highlight-index="highlightedIndex = $event"
            @handle-backspace="handleBackspace"
            @select-autor="selectAutor($event)"
            @remove-autor="removeAutor($event)"
          ></basic-form-section>

          <!-- Seção de Atividades (fora do formulário principal) -->
          <div class="activities-section">
            <h2 class="activities-title">Gerenciar Atividades</h2>

            <!-- Formulário de Atividade -->
            <form @submit.prevent="submitAtividade" class="activity-form">
              <div class="activity-inputs">
                <div class="form-group w-8/12">
                  <label class="form-label">Atividade</label>
                  <input
                    ref="atividadeInput"
                    v-model="novaAtividade.nome"
                    type="text"
                    required
                    class="form-input"
                    placeholder="Nome da atividade"
                  />
                </div>

                <div class="form-group w-2/12">
                  <label class="form-label">Estimativa de horas</label>
                  <input
                    v-model.number="novaAtividade.horas"
                    type="number"
                    required
                    min="0"
                    ref="horasInput"
                    class="form-input text-center"
                    placeholder="0"
                  />
                </div>

                <div class="form-group w-2/12">
                  <label class="form-label">&nbsp;</label>
                  <form @submit.prevent="submitAtividade">
                    <!-- Outros campos do formulário -->
                    <button
                      type="button"
                      @click="submitAtividade"
                      ref="ActivityButton"
                      class="btn"
                      :class="editingIndex !== null ? 'btn-update' : 'btn-primary'"
                    >
                      {% raw %}{{ editingIndex !== null ? 'Atualizar' :
                      'Adicionar' }}{% endraw %}
                    </button>
                  </form>
                </div>
              </div>
            </form>

            <!-- Lista de Atividades -->
            <data-table
              v-if="atividades.length > 0"
              :items="atividades"
              :columns="[
              { key: 'nome', label: 'Atividade', width: 'w-8/12', align: 'text-left', type: 'text' },
              { key: 'horas', label: 'Estimativa de horas', width: 'w-2/12', align: 'text-center', type: 'text' },
              { key: 'actions', label: 'Ações', width: 'w-2/12', align: 'text-center', type: 'buttons', actions: { edit: true, delete: true } }
            ]"
              :key-function="(item, index) => `atividade-${index}`"
              :drag-ref="'dragArea'"
              :draggable="true"
              :show-footer="true"
              :footer-items="[
              { label: 'Total de horas', value: totalHoras, colspan: 1 },
              { label: 'Quantidade de PF', value: pontosFuncao, colspan: 2 }
            ]"
              @edit="editarAtividade"
              @delete="removerAtividade"
              @reorder="reordenarAtividades"
            >
            </data-table>
          </div>

          <!-- Seção de formatos e botão Gerar Documentos -->
          <form-submit-section
            :formatos="formData"
            :is-loading="isLoading"
            :is-formato-valido="formData.gerarDocx || formData.gerarPdf"
            :status-message="status.message"
            :status-type="status.type"
            button-text="Gerar Documento"
            loading-text="Gerando..."
            @submit="gerarDocumento"
            @update:docx="formData.gerarDocx = $event"
            @update:pdf="formData.gerarPdf = $event"
          ></form-submit-section>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-confirmacao.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-message.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-requisito.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
