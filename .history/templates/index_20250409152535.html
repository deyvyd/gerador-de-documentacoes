<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Documentações</title>

    <link
      rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
    />

    <!-- 1. Carrega primeiro as definições de cores -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/colors.css') }}"
    />

    <!-- 2. Carrega os estilos principais -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />

    <!-- 3. Carrega os estilos de modais e toasts -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/modal.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/toast.css') }}"
    />

    <!-- 4. Carrega o CSS do Quill -->
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      rel="stylesheet"
    />

    <!-- 5. Carrega as sobrescrições para o Quill por último -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/quill-overrides.css') }}"
    />

    <!-- Tailwind CSS CLI -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/tailwind.css') }}"
    />

    <!-- Scripts -->

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/maska@2.1.10/dist/maska.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  </head>

  <body>
    {% raw %}
    <div id="app">
      <!-- Toggle de Tema -->
      <theme-toggle :is-dark="isDark" @toggle="toggleTheme"></theme-toggle>

      <div class="container">
        <div class="main-card">
          <page-header
            title="Gerador de Documentações Técnicas"
            icon="📝"
            tooltip-title="Este sistema gera um arquivo .zip com documentos de desenvolvimento:"
            :tooltip-items="[
                              'Estimativa de Esforço e Cronograma',
                              'Estratégia de Solução',
                              'Relatório de Acompanhamento de Projeto'
                            ]"
          ></page-header>

          <!-- Formulário de Informações básicas da SS -->
          <basic-form-section
            :form-data="formData"
            :selected-autores="selectedAutores"
            :autor-input="autorInput"
            :show-suggestions="showSuggestions"
            :filtered-autores="filteredAutores"
            :highlighted-index="highlightedIndex"
            @update:numero-ss="formData.numeroSS = $event"
            @format-ss="formatSS"
            @update:autor-input="autorInput = $event"
            @show-suggestions="showSuggestions = $event"
            @navigate-list="navigateList($event)"
            @highlight-index="highlightedIndex = $event"
            @handle-backspace="handleBackspace"
            @select-autor="selectAutor($event)"
            @remove-autor="removeAutor($event)"
          ></basic-form-section>

          <!-- Seção de Atividades (fora do formulário principal) -->
          <div class="activities-section">
            <h2 class="activities-title">Gerenciar Atividades</h2>

            <!-- Formulário de Atividade -->
            <form @submit.prevent="submitAtividade" class="activity-form">
              <div class="activity-inputs">
                <div class="form-group w-8/12">
                  <label class="form-label">Atividade</label>
                  <input
                    ref="atividadeInput"
                    v-model="novaAtividade.nome"
                    type="text"
                    required
                    class="form-input"
                    placeholder="Nome da atividade"
                  />
                </div>

                <div class="form-group w-2/12">
                  <label class="form-label">Estimativa de horas</label>
                  <input
                    v-model.number="novaAtividade.horas"
                    type="number"
                    required
                    min="0"
                    class="form-input text-center"
                    placeholder="0"
                  />
                </div>

                <div class="form-group w-2/12">
                  <label class="form-label">&nbsp;</label>
                  <button
                    type="submit"
                    class="btn"
                    :class="editingIndex !== null ? 'btn-update' : 'btn-primary'"
                  >
                    {{ editingIndex !== null ? 'Atualizar' : 'Adicionar' }}
                  </button>
                </div>
              </div>
            </form>

            <!-- Lista de Atividades -->
            <div
              v-if="atividades.length > 0"
              class="activities-table-container"
            >
              <table class="activities-table" ref="dragArea">
                <thead>
                  <tr>
                    <th class="w-8/12 text-left pl-8">Atividade</th>
                    <th class="w-2/12 text-center">Estimativa de horas</th>
                    <th class="w-2/12 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody ref="dragArea" class="text-sm">
                  <tr
                    v-for="(atividade, index) in atividades"
                    :key="atividade.nome + '-' + index"
                    class="cursor-move"
                  >
                    <td class="relative group">
                      <!-- Texto da atividade com padding consistente -->
                      <div class="pl-2 py-2">{{ atividade.nome }}</div>
                    </td>
                    <td class="text-center">{{ atividade.horas }}</td>
                    <td class="text-center">
                      <button
                        @click="editarAtividade(index)"
                        class="action-button edit-button"
                      >
                        <svg
                          xmlns="http://www.w3.org/2000/svg"
                          class="h-5 w-5"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <path
                            d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                          />
                          <path
                            d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                          />
                        </svg>
                      </button>
                      <button
                        @click="removerAtividade(index)"
                        class="action-button delete-button"
                      >
                        <svg
                          xmlns="http://www.w3.org/2000/svg"
                          class="h-5 w-5"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <path d="M3 6h18" />
                          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        </svg>
                      </button>
                    </td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr>
                    <td colspan="1" class="text-center font-medium">
                      <span class="total-label">Total de horas: </span>
                      <span class="total-value">{{ totalHoras }}</span>
                    </td>
                    <td colspan="2" class="text-center font-medium">
                      <span class="total-label">Quantidade de PF: </span>
                      <span class="total-value">{{ pontosFuncao }}</span>
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>

          <!-- Seção de formatos e botão Gerar Documentos -->
          <div class="mt-6">
            <!-- Container flex para alinhar os elementos -->
            <div class="flex justify-center items-center gap-4">
              <!-- Seção de Formato dos arquivos -->
              <div class="format-section">
                <div class="flex items-center gap-4">
                  <h3 class="format-title whitespace-nowrap">
                    Formato dos arquivos
                  </h3>
                  <div class="flex gap-4">
                    <label class="checkbox-container">
                      <input
                        type="checkbox"
                        v-model="formatos.docx"
                        class="checkbox-input"
                      />
                      <span class="checkbox-label">DOCX</span>
                    </label>
                    <label class="checkbox-container">
                      <input
                        type="checkbox"
                        v-model="formatos.pdf"
                        class="checkbox-input"
                      />
                      <span class="checkbox-label">PDF</span>
                    </label>
                  </div>
                </div>
              </div>

              <!-- Botão Gerar Documento com spinner -->
              <button
                @click="submitForm"
                class="btn btn-primary w-64"
                :disabled="isSubmitting || !isFormatoValido"
              >
                <template v-if="isSubmitting">
                  <svg
                    class="animate-spin -ml-1 mr-2 h-5 w-5 text-white"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <circle
                      class="opacity-25"
                      cx="12"
                      cy="12"
                      r="10"
                      stroke="currentColor"
                      stroke-width="4"
                    ></circle>
                    <path
                      class="opacity-75"
                      fill="currentColor"
                      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                    ></path>
                  </svg>
                  Processando
                </template>
                <template v-else> Gerar Documento </template>
              </button>
            </div>
          </div>

          <!-- Mensagem de status -->
          <div
            v-if="status.message"
            :class="['status-message mt-4', status.type === 'error' ? 'status-error' : 'status-success']"
          >
            <div class="flex items-center justify-center gap-2">
              <!-- Ícone de status -->
              <div v-if="status.type === 'success'" class="status-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M5 13l4 4L19 7"
                  />
                </svg>
              </div>
              <div v-else-if="status.type === 'error'" class="status-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                  />
                </svg>
              </div>

              <!-- Mensagem -->
              <span>{{ status.message }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    {% endraw %}

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-confirmacao.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-message.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-requisito.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
